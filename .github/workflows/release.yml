name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build distribution
        run: ./gradlew -Pversion=$VERSION distZip

      - name: Rename archive
        run: |
          mv build/distributions/storeray-$VERSION.zip build/distributions/storeray-${{ github.ref_name }}.zip
          mv build/distributions/storeray-$VERSION.tar build/distributions/storeray-${{ github.ref_name }}.tar 2>/dev/null || true

      - name: Generate checksums
        working-directory: build/distributions
        run: |
          sha256sum storeray-${{ github.ref_name }}.zip > storeray-${{ github.ref_name }}.zip.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/distributions/storeray-${{ github.ref_name }}.zip
            build/distributions/storeray-${{ github.ref_name }}.zip.sha256
          generate_release_notes: true
